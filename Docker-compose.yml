services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5009:5009"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://18.232.181.249:5009/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped